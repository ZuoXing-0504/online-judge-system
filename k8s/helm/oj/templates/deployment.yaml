apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "oj.fullname" . }}-app
  labels:
    app: {{ include "oj.name" . }}-app
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "oj.name" . }}-app
  template:
    metadata:
      labels:
        app: {{ include "oj.name" . }}-app
    spec:
      initContainers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@postgres:5432/{{ .Values.postgres.database }}"
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "{{ .Values.app.port }}"]
          ports:
            - containerPort: {{ .Values.app.port }}
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@postgres:5432/{{ .Values.postgres.database }}"
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: SECRET_KEY
              value: {{ .Values.secrets.secretKey }}
            - name: DEBUG
              value: {{ .Values.config.debug }}
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: {{ .Values.app.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: {{ .Values.app.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
