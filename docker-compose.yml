services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: judge
      POSTGRES_PASSWORD: judge_pass
      POSTGRES_DB: online_judge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge -d online_judge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://judge:judge_pass@postgres:5432/online_judge
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: dev-secret-key-change-in-production
      DEBUG: "true"
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  worker:
    build: .
    command: arq app.judge.worker.WorkerSettings
    environment:
      DATABASE_URL: postgresql+asyncpg://judge:judge_pass@postgres:5432/online_judge
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SECRET_KEY: dev-secret-key-change-in-production
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
