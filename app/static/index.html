<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Online Judge</title>
<meta name="description" content="Online code judge - browse problems and submit solutions." />
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
<link rel="stylesheet" href="/static/styles.css" />
</head>
<body data-page="home" data-shell="user">
<div class="app-shell">
<header class="site-header">
  <a class="brand" href="/portal"><span class="brand-mark">&lt;/&gt;</span><span class="brand-copy"><strong>Online Judge</strong></span></a>
  <nav class="site-nav">
    <a data-nav="home" href="/portal">Home</a>
    <a data-nav="problems" href="/problems">Problems</a>
    <a data-nav="submit" href="/submit">Submit</a>
    <a data-nav="submissions" href="/submissions">Submissions</a>
    <a data-nav="contests" href="/contests-page">Contests</a>
  </nav>
  <div class="header-tools">
    <div class="session-panel">
      <div class="session-copy"><strong id="session-name">Guest</strong><span id="session-role">Sign in to get started.</span></div>
      <a class="secondary-button compact hidden" id="admin-entry" href="/admin">Admin</a>
      <a class="secondary-button compact" id="auth-link" href="/auth">Sign in</a>
      <button class="secondary-button compact hidden" id="logout-button" type="button">Log out</button>
    </div>
  </div>
</header>
<main class="page-layout">
  <div class="hero-bar">
    <h1>Online Judge</h1>
    <div class="hero-actions">
      <a class="primary-button" href="/problems">Problems</a>
      <a class="secondary-button" href="/submit">Submit code</a>
    </div>
  </div>

  <section class="panel surface" id="featured-section">
    <div class="panel-heading split">
      <h2>Problems</h2>
      <a class="ghost-link" href="/problems">View all</a>
    </div>
    <div class="stack-list" id="featured-problems"></div>
    <div id="user-stats" style="display:none;margin-top:16px"></div>
  </section>
</main>
</div>
<script type="module" src="/static/js/bundle.js"></script>
</body>
</html>
