<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Problems - Online Judge System</title>
    <meta id="page-description" name="description" content="Browse public problems on a dedicated archive page." />
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body data-page="problems" data-shell="user">
    <div class="app-shell">
      <div class="ambient ambient-a"></div>
      <div class="ambient ambient-b"></div>
      <div class="ambient-grid"></div>
      <header class="site-header">
        <a class="brand" href="/portal">
          <span class="brand-mark">&lt;/&gt;</span>
          <span class="brand-copy">
            <span class="eyebrow" data-i18n="nav.stack">FastAPI + Redis + PostgreSQL</span>
            <strong data-i18n="nav.brand">Online Judge System</strong>
          </span>
        </a>
        <nav class="site-nav">
          <a data-nav="home" href="/portal" data-i18n="nav.home">Home</a>
          <a data-nav="problems" href="/problems" data-i18n="nav.problems">Problems</a>
          <a data-nav="submit" href="/submit" data-i18n="nav.submit">Submit</a>
          <a data-nav="submissions" href="/submissions" data-i18n="nav.submissions">Submissions</a>
          <a data-nav="contests" href="/contests-page">Contests</a>
        </nav>
        <div class="header-tools">
          <label class="language-picker">
            <span data-i18n="nav.language">Language</span>
            <select id="language-select" aria-label="Language"></select>
          </label>
          <div class="session-panel">
            <span class="status-chip neutral" id="health-pill" data-i18n="health.checking">Checking API</span>
            <div class="session-copy">
              <strong id="session-name" data-i18n="session.guest">Guest</strong>
              <span id="session-role" data-i18n="session.guestHint">Browse public features without signing in.</span>
            </div>
            <a class="secondary-button compact hidden" id="admin-entry" href="/admin" data-i18n="session.adminConsole">Admin console</a>
            <a class="secondary-button compact" id="auth-link" href="/auth" data-i18n="session.signIn">Sign in</a>
            <button class="secondary-button compact hidden" id="logout-button" type="button" data-i18n="session.logout">Log out</button>
          </div>
        </div>
      </header>

      <main class="page-layout">
        <div class="hero-bar">
          <h1>Problems</h1>
        </div>
        <section class="panel surface">
          <div class="panel-heading split">
            <div class="filter-grid" style="grid-template-columns:1fr 140px auto;align-items:end">
              <label><span>Search</span><input id="problem-search" type="search" placeholder="Search by title or slug" /></label>
              <label><span>Difficulty</span><select id="problem-difficulty"><option value="">All</option><option value="easy">Easy</option><option value="medium">Medium</option><option value="hard">Hard</option></select></label>
              <button class="secondary-button compact" id="refresh-problems" type="button">Refresh</button>
            </div>
          </div>
          <p class="mini-copy" id="problem-count"></p>
          <div class="stack-list" id="problem-list"></div>
          <div id="pagination-container"></div>
        </section>
      </main>
    </div>

    <script type="module" src="/static/js/bundle.js"></script>
  </body>
</html>
